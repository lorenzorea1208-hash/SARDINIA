<body>
<div id="root"></div>
<script id="src" type="text/plain">
const {useState,useMemo,useRef,useEffect}=React;

/* ── icone ── */
function Ico({d,size=16,sw=1.5,fill="none",vb="0 0 24 24"}){
  return <svg width={size} height={size} viewBox={vb} fill={fill} stroke="currentColor" strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round">{d.split("|").map((p,i)=><path key={i} d={p}/>)}</svg>;
}
const IPin    =({s=16})=><Ico s={s} sw={1.5} d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z|M12 10m-3 0a3 3 0 1 0 6 0a3 3 0 1 0 -6 0"/>;
const ICompass=({s=16})=><Ico size={s} sw={1.5} d="M12 22A10 10 0 1 0 12 2a10 10 0 0 0 0 20z|m16.24 7.76-2.12 6.36-6.36 2.12 2.12-6.36 6.36-2.12z"/>;
const IRoute  =({s=16})=><Ico size={s} sw={1.5} d="M3 3h6v6H3z|M15 3h6v6h-6z|M3 15h6v6H3z|M15 18h6|M18 15v6|M6 9v6|M9 6h6"/>;
const IHome   =({s=16})=><Ico size={s} sw={1.5} d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z|M9 22V12h6v10"/>;
const IPrint  =({s=16})=><Ico size={s} sw={1.5} d="M6 9V2h12v7|M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2|M6 14h12v8H6z"/>;
const IChevron=({s=14,up=false})=><Ico size={s} sw={2} d={up?"M18 15l-6-6-6 6":"M6 9l6 6 6-6"}/>;
const IBed    =({s=16})=><Ico size={s} sw={1.5} d="M2 4v16|M2 8h18a2 2 0 0 1 2 2v10|M2 17h20|M6 8v9"/>;
const IPlus   =({s=16})=><Ico size={s} sw={2.5} d="M12 5v14|M5 12h14"/>;
const IMinus  =({s=16})=><Ico size={s} sw={2.5} d="M5 12h14"/>;

/* ── dati tappe ── */
const CAGLIARI={id:"cagliari",name:"Cagliari (Aeroporto)",lat:39.2525762,lon:9.056808,fixed:true};

const PRESET_STOPS=[
  {id:"tuerredda",  emoji:"🏖️",name:"Tuerredda",         lat:38.8969,lon:8.9028, tag:"Mare",
   desc:"Una delle spiagge più belle d'Europa. Acqua caraibica, sabbia bianca e panorama spettacolare. Arriva presto la mattina.",
   accom:{town:"Teulada",note:"Borgo tranquillo a 10 min dalla spiaggia, buoni B&B e agriturismi."}},

  {id:"chia",       emoji:"🌴",name:"Chia",                lat:38.9197,lon:8.8592, tag:"Mare",
   desc:"Non una singola spiaggia ma un'intera zona: Su Giudeu, Cala Cipolla e Porto Campana. Dune, fenicotteri e trekking panoramici.",
   accom:{town:"Chia / Domus de Maria",note:"Resort e strutture direttamente sulla costa. Alta stagione: prenota con anticipo."}},

  {id:"nora",       emoji:"🏛️",name:"Nora",               lat:38.9978,lon:9.0083, tag:"Cultura",
   desc:"L'antica città fenicio-romana sul mare. Rovine di oltre 2.000 anni con il mare sullo sfondo.",
   accom:{town:"Pula",note:"Paese vivace a 3 km dal sito, ottima scelta di hotel e ristoranti."}},

  {id:"villasimius",emoji:"🏝️",name:"Villasimius",        lat:39.1183,lon:9.5193, tag:"Mare",
   desc:"Acque trasparenti, calette e paesaggi da cartolina. La strada costiera da Cagliari vale il viaggio da sola.",
   accom:{town:"Villasimius",note:"Centro con hotel, B&B e appartamenti. Zona turistica ben servita."}},

  {id:"portoflavia",emoji:"⛏️",name:"Porto Flavia e Masua",lat:39.3497,lon:8.3844, tag:"Cultura",
   desc:"Il luogo più spettacolare e meno conosciuto della Sardegna: un porto scavato nella roccia affacciato sul Pan di Zucchero.",
   accom:{town:"Iglesias",note:"Città mineraria storica a 20 min, ricca offerta di alloggi e cucina sarda autentica."}},

  {id:"portopino",  emoji:"🏜️",name:"Dune di Porto Pino", lat:38.9247,lon:8.6247, tag:"Natura",
   desc:"Sembrano un piccolo deserto affacciato sul mare. Uno dei paesaggi più particolari dell'isola.",
   accom:{town:"Sant'Anna Arresi",note:"Piccolo paese a 5 km dalle dune. Atmosfera locale autentica."}},

  {id:"caladomestica",emoji:"🌅",name:"Cala Domestica",   lat:39.1556,lon:8.4422, tag:"Mare",
   desc:"Una cala incastonata tra le scogliere. Atmosfera unica, perfetta al tramonto.",
   accom:{town:"Buggerru",note:"Paese di minatori affacciato sul mare, a pochi minuti dalla cala."}},

  {id:"piscinas",   emoji:"🏖️",name:"Piscinas e Costa Verde",lat:39.4614,lon:8.6211, tag:"Natura",
   desc:"Dune tra le più alte d'Europa e chilometri di costa selvaggia: la Sardegna più autentica e meno turistica.",
   accom:{town:"Arbus",note:"Paese in quota sopra Piscinas. Hotel Le Dune direttamente sulla spiaggia (prenotare prima)."}},

  {id:"cagliari_city",emoji:"🌇",name:"Cagliari",         lat:39.2238,lon:9.1217, tag:"Cultura",
   desc:"Quartiere Castello · Bastione Saint Remy · Marina · Spiaggia del Poetto · Saline dei fenicotteri.",
   accom:{town:"Cagliari centro",note:"Ampia scelta: boutique hotel in Marina, B&B nel Castello, apart-hotel in zona porto."}},
];

const TAG_COLORS={"Mare":"#5fa8a0","Cultura":"#e8a13c","Natura":"#7fae5c"};
const BASE_COLORS=["#e8a13c","#5fa8a0","#d9694f","#8a7fc7","#7fae5c","#c75f9e","#4f9fd9"];

/* ── algoritmo TSP ── */
function toRad(d){return d*Math.PI/180;}
function haversineKm(a,b){
  const R=6371,dLat=toRad(b.lat-a.lat),dLon=toRad(b.lon-a.lon);
  const h=Math.sin(dLat/2)**2+Math.cos(toRad(a.lat))*Math.cos(toRad(b.lat))*Math.sin(dLon/2)**2;
  return R*2*Math.asin(Math.sqrt(h));
}
function buildDist(nodes){
  const n=nodes.length,m=Array.from({length:n},()=>new Array(n).fill(0));
  for(let i=0;i<n;i++) for(let j=i+1;j<n;j++){const d=haversineKm(nodes[i],nodes[j]);m[i][j]=d;m[j][i]=d;}
  return m;
}
function tourLen(ord,m){let s=0;for(let i=0;i<ord.length;i++) s+=m[ord[i]][ord[(i+1)%ord.length]];return s;}
function nnTour(m,s){
  const n=m.length,vis=new Array(n).fill(false),ord=[s];vis[s]=true;
  for(let step=1;step<n;step++){let best=-1,bd=Infinity,cur=ord[ord.length-1];for(let j=0;j<n;j++){if(!vis[j]&&m[cur][j]<bd){bd=m[cur][j];best=j;}}ord.push(best);vis[best]=true;}
  return ord;
}
function twoOpt(ord,m){
  let best=ord.slice(),bLen=tourLen(best,m),imp=true;
  while(imp){imp=false;for(let i=1;i<best.length-1;i++) for(let k=i+1;k<best.length;k++){const nOrd=best.slice(0,i).concat(best.slice(i,k+1).reverse(),best.slice(k+1));const nLen=tourLen(nOrd,m);if(nLen<bLen-1e-10){bLen=nLen;best=nOrd;imp=true;}}}
  return best;
}
function solveRoute(nodes){
  const m=buildDist(nodes),nn=nnTour(m,0),opt=twoOpt(nn,m);
  const z=opt.indexOf(0),rot=opt.slice(z).concat(opt.slice(0,z));rot.push(0);return rot;
}

/* ── k-MEDOIDS ──
   Dato n stop e la loro matrice distanze, trova k cluster ottimali
   per minimizzare la somma delle distanze di ogni stop al proprio medoid.
   Usa multiple restart per evitare ottimi locali.
*/
function kMedoids(n,dist,k){
  if(k>=n){
    return{medoids:Array.from({length:n},(_,i)=>i),clusters:Array.from({length:n},(_,i)=>i)};
  }
  const RESTARTS=12;
  let bestCost=Infinity,bestResult=null;

  for(let r=0;r<RESTARTS;r++){
    // init: k-means++ (primo medoid casuale, successivi weighted by dist²)
    const all=Array.from({length:n},(_,i)=>i).sort(()=>Math.random()-.5);
    const med=[all[0]];
    for(let m=1;m<k;m++){
      const d2=Array.from({length:n},(_,i)=>Math.min(...med.map(me=>dist[i][me]))**2);
      const tot=d2.reduce((a,b)=>a+b,0);
      let rv=Math.random()*tot,chosen=all[0];
      for(let i=0;i<n;i++){rv-=d2[i];if(rv<=0){chosen=i;break;}}
      med.push(chosen);
    }

    const cl=new Array(n).fill(0);
    let changed=true;
    for(let iter=0;iter<200&&changed;iter++){
      changed=false;
      // assegna
      for(let i=0;i<n;i++){
        let best=0,bd=Infinity;
        for(let m=0;m<k;m++){const d=dist[i][med[m]];if(d<bd){bd=d;best=m;}}
        if(cl[i]!==best){cl[i]=best;changed=true;}
      }
      // aggiorna medoid
      for(let m=0;m<k;m++){
        const members=Array.from({length:n},(_,i)=>i).filter(i=>cl[i]===m);
        if(!members.length) continue;
        let bm=med[m],bc=Infinity;
        for(const c of members){const cost=members.reduce((s,i)=>s+dist[c][i],0);if(cost<bc){bc=cost;bm=c;}}
        if(bm!==med[m]){med[m]=bm;changed=true;}
      }
    }
    const cost=Array.from({length:n},(_,i)=>i).reduce((s,i)=>s+dist[i][med[cl[i]]],0);
    if(cost<bestCost){bestCost=cost;bestResult={medoids:[...med],clusters:[...cl]};}
  }
  return bestResult;
}

function allocNights(bases,total){
  const n=bases.length,w=bases.map(b=>b.length),sw=w.reduce((a,b)=>a+b,0);
  const nights=w.map(x=>Math.max(1,Math.round(x/sw*total)));
  let diff=nights.reduce((a,b)=>a+b,0)-total;
  while(diff>0){nights[nights.indexOf(Math.max(...nights))]--;diff--;}
  while(diff<0){nights[nights.indexOf(Math.min(...nights))]++;diff++;}
  return nights;
}

/* ── APP ── */
export default function App(){
  const [selected,setSelected]=useState(()=>new Set(PRESET_STOPS.map(s=>s.id)));
  const [totalNights,setTotalNights]=useState(7);
  const [numBases,setNumBases]=useState(2);
  const [result,setResult]=useState(null);

  const selCount=PRESET_STOPS.filter(s=>selected.has(s.id)).length;
  const maxBases=Math.max(1,Math.min(5,selCount));

  function toggle(id){setSelected(p=>{const n=new Set(p);n.has(id)?n.delete(id):n.add(id);return n;});setResult(null);}

  function compute(){
    const chosen=PRESET_STOPS.filter(s=>selected.has(s.id));
    if(chosen.length<2){setResult({error:"Seleziona almeno due tappe."});return;}

    const nodes=[CAGLIARI,...chosen];
    const k=Math.min(numBases,chosen.length);

    /* 1 – TSP su tutti i nodi */
    const routeIdx=solveRoute(nodes);

    /* 2 – k-medoids solo sulle tappe scelte */
    const chosenDist=buildDist(chosen);
    const{medoids,clusters}=kMedoids(chosen.length,chosenDist,k);
    // medoids[m] = indice in chosen[] del medoid del cluster m
    // clusters[j] = cluster di chosen[j]

    /* 3 – mappa cluster → indici in nodes[] */
    const nodeCluster={};
    chosen.forEach((_,j)=>{nodeCluster[j+1]=clusters[j];});

    /* 4 – ordina basi nell'ordine in cui compaiono nel percorso TSP */
    const clusterOrder=[];
    for(const ni of routeIdx){
      if(ni===0) continue;
      const c=nodeCluster[ni];
      if(c!==undefined&&!clusterOrder.includes(c)) clusterOrder.push(c);
    }
    // Assicura tutti i cluster presenti
    for(let c=0;c<k;c++) if(!clusterOrder.includes(c)) clusterOrder.push(c);

    /* 5 – costruisci basi ordinate (stop in ordine TSP) */
    const bases=clusterOrder.map(c=>routeIdx.filter(ni=>ni!==0&&nodeCluster[ni]===c));

    /* 6 – medoid di ciascuna base (come node index) */
    const medoidNodeIdx=clusterOrder.map(c=>medoids[c]+1);

    /* 7 – notti */
    const nights=allocNights(bases,totalNights);

    /* 8 – piano giorni */
    const days=[];let dc=1;
    const firstBase=nodes[bases[0][0]];
    days.push({day:dc++,type:"arrivo",label:`Arrivo a Cagliari → trasferimento: ${firstBase.name}`});
    bases.forEach((base,bi)=>{
      const n=nights[bi],stps=base.map(i=>nodes[i]);
      for(let d=0;d<n;d++){
        let lbl;
        if(!stps.length) lbl="Giornata libera";
        else if(stps.length<=n){const s=stps[d%stps.length];lbl=d<stps.length?`${s.emoji||""}  ${s.name}`:"Giornata libera / relax";}
        else{const pp=Math.ceil(stps.length/n);const ch=stps.slice(d*pp,(d+1)*pp).map(s=>`${s.emoji||""} ${s.name}`).join(" + ");lbl=`Visita: ${ch}`;}
        days.push({day:dc++,type:"base",base:bi+1,label:lbl,baseName:stps[0]?.name});
      }
      if(bi<bases.length-1){
        const nxt=nodes[bases[bi+1][0]],lst=stps[stps.length-1];
        const dd=haversineKm(lst,nxt),tt=dd/60*60;
        days[days.length-1].label+=` → trasf. Base ${bi+2}: ${nxt.name} (~${Math.round(dd)} km, ~${Math.round(tt)} min)`;
      }
    });
    days.push({day:dc++,type:"rientro",label:"Rientro a Cagliari ✈"});

    /* 9 – statistiche */
    const segKm=[];let totalKm=0,totalMin=0;
    for(let i=0;i<routeIdx.length-1;i++){
      const a=nodes[routeIdx[i]],b=nodes[routeIdx[i+1]],km=haversineKm(a,b);
      segKm.push(Math.round(km));totalKm+=km;totalMin+=km/60*60;
    }

    /* 10 – schede alloggio */
    const accommodations=clusterOrder.map((c,bi)=>{
      const medNode=nodes[medoidNodeIdx[bi]];
      const preset=PRESET_STOPS.find(s=>s.id===medNode.id);
      return{
        baseNum:bi+1,
        color:BASE_COLORS[bi%BASE_COLORS.length],
        medoidStop:medNode,
        town:preset?.accom?.town||medNode.name,
        note:preset?.accom?.note||"",
        stops:bases[bi].map(ni=>nodes[ni]),
        nights:nights[bi],
        medoidNodeIdx:medoidNodeIdx[bi],
      };
    });

    setResult({nodes,routeIdx,bases,nights,days,segKm,
      totalKm:Math.round(totalKm),totalHours:(totalMin/60).toFixed(1),
      numBasesUsed:k,nodeCluster,medoidNodeIdx,accommodations});
  }

  return(
    <div className="min-h-screen text-[#f2ead3]" style={{fontFamily:"Georgia,'Times New Roman',serif",background:"linear-gradient(160deg,#0d2b3e 0%,#071c28 100%)"}}>
      <div className="max-w-7xl mx-auto px-4 sm:px-6 py-8">
        <Header hasResult={!!result&&!result.error}/>
        <div className="grid xl:grid-cols-[420px_1fr] gap-6 mt-8">
          <Left selected={selected} toggle={toggle}
            totalNights={totalNights} setTotalNights={setTotalNights}
            numBases={numBases} setNumBases={setNumBases}
            maxBases={maxBases} selCount={selCount} compute={compute}/>
          <Right result={result}/>
        </div>
      </div>
    </div>
  );
}

function Header({hasResult}){
  return(
    <header className="border-b border-[#f2ead3]/15 pb-6 no-print">
      <div className="flex items-center justify-between">
        <div className="flex items-center gap-3 text-[#e8a13c]">
          <ICompass s={24}/><span className="uppercase tracking-[0.25em] text-[11px] font-sans">Pianificatore · Sardegna Sud</span>
        </div>
        {hasResult&&<button onClick={()=>window.print()} className="flex items-center gap-2 px-4 py-2 rounded-lg border border-[#e8a13c]/40 text-[#e8a13c] text-[13px] font-sans hover:bg-[#e8a13c]/10 transition"><IPrint s={14}/> Stampa / PDF</button>}
      </div>
      <h1 className="text-4xl md:text-5xl mt-3 leading-tight">Traccia il tuo giro<br/>dell'isola</h1>
      <p className="mt-2 text-[#f2ead3]/50 font-sans text-[13px] max-w-xl leading-relaxed">
        Scegli le tappe e il numero di basi. L'algoritmo trova automaticamente le zone di alloggio ottimali e calcola il percorso più efficiente.
      </p>
    </header>
  );
}

/* ── LEFT PANEL ── */
function Left({selected,toggle,totalNights,setTotalNights,numBases,setNumBases,maxBases,selCount,compute}){
  return(
    <div className="space-y-4 font-sans no-print">
      {/* Tappe */}
      <div className="border border-[#f2ead3]/10 rounded-xl bg-[#0a2230]/60 overflow-hidden">
        <div className="px-4 pt-4 pb-2 flex items-center justify-between">
          <div className="flex items-center gap-2 text-[#e8a13c]"><IPin s={14}/><span className="text-[11px] uppercase tracking-[0.2em] font-bold">Tappe</span></div>
          <span className="text-[11px] text-[#f2ead3]/40">{selCount}/{PRESET_STOPS.length}</span>
        </div>
        <div className="divide-y divide-[#f2ead3]/5">
          {PRESET_STOPS.map(s=><StopCard key={s.id} stop={s} checked={selected.has(s.id)} onToggle={()=>toggle(s.id)}/>)}
        </div>
      </div>

      {/* Parametri */}
      <div className="border border-[#f2ead3]/10 rounded-xl p-4 bg-[#0a2230]/60 space-y-5">
        <div className="flex items-center gap-2 text-[#e8a13c]"><IRoute s={14}/><span className="text-[11px] uppercase tracking-[0.2em] font-bold">Parametri viaggio</span></div>

        {/* Notti */}
        <div>
          <div className="flex justify-between mb-2"><span className="text-[12px] text-[#f2ead3]/60">Notti totali (escluso voli)</span><span className="text-[12px] text-[#e8a13c] font-bold">{totalNights}</span></div>
          <div className="flex items-center gap-2">
            <button onClick={()=>setTotalNights(n=>Math.max(2,n-1))} className="w-8 h-8 rounded-lg border border-[#f2ead3]/20 flex items-center justify-center text-[#f2ead3]/60 hover:border-[#e8a13c] hover:text-[#e8a13c] transition"><IMinus s={14}/></button>
            <div className="flex-1 text-center text-2xl text-[#e8a13c] font-bold" style={{fontFamily:"Georgia,serif"}}>{totalNights}</div>
            <button onClick={()=>setTotalNights(n=>Math.min(21,n+1))} className="w-8 h-8 rounded-lg border border-[#f2ead3]/20 flex items-center justify-center text-[#f2ead3]/60 hover:border-[#e8a13c] hover:text-[#e8a13c] transition"><IPlus s={14}/></button>
          </div>
        </div>

        {/* Numero basi ← NUOVO */}
        <div className="border-t border-[#f2ead3]/8 pt-5">
          <div className="flex justify-between mb-1"><span className="text-[12px] text-[#f2ead3]/60">Basi di alloggio</span><span className="text-[12px] text-[#e8a13c] font-bold">{numBases}</span></div>
          <p className="text-[11px] text-[#f2ead3]/35 mb-3 leading-relaxed">L'algoritmo trova le zone ottimali dove dormire per minimizzare gli spostamenti giornalieri.</p>
          <div className="flex items-center gap-2">
            <button onClick={()=>setNumBases(n=>Math.max(1,n-1))} className="w-8 h-8 rounded-lg border border-[#f2ead3]/20 flex items-center justify-center text-[#f2ead3]/60 hover:border-[#e8a13c] hover:text-[#e8a13c] transition"><IMinus s={14}/></button>
            <div className="flex-1 flex gap-1.5 justify-center">
              {Array.from({length:Math.min(maxBases,5)},(_,i)=>(
                <button key={i} onClick={()=>setNumBases(i+1)}
                  className={`w-9 h-9 rounded-lg text-[13px] font-bold transition border ${numBases===i+1?"border-[#e8a13c] text-[#e8a13c] bg-[#e8a13c]/10":"border-[#f2ead3]/15 text-[#f2ead3]/40 hover:border-[#f2ead3]/40"}`}>
                  {i+1}
                </button>
              ))}
            </div>
            <button onClick={()=>setNumBases(n=>Math.min(maxBases,n+1))} className="w-8 h-8 rounded-lg border border-[#f2ead3]/20 flex items-center justify-center text-[#f2ead3]/60 hover:border-[#e8a13c] hover:text-[#e8a13c] transition"><IPlus s={14}/></button>
          </div>
        </div>
      </div>

      <button onClick={compute}
        className="w-full bg-gradient-to-r from-[#e8a13c] to-[#f0b94e] text-[#0d2b3e] rounded-xl py-4 text-[15px] font-bold tracking-wide hover:opacity-90 active:scale-[.98] transition flex items-center justify-center gap-2 shadow-xl shadow-[#e8a13c]/20">
        <ICompass s={18}/> Calcola itinerario ottimale
      </button>
    </div>
  );
}

function StopCard({stop,checked,onToggle}){
  const [open,setOpen]=useState(false);
  return(
    <div className={`transition-colors ${checked?"bg-[#e8a13c]/5":""}`}>
      <div className="flex items-start gap-3 px-4 py-3">
        <input type="checkbox" checked={checked} onChange={onToggle} className="mt-1 w-4 h-4 accent-[#e8a13c] flex-shrink-0 cursor-pointer"/>
        <div className="flex-1 min-w-0">
          <div className="flex items-center justify-between gap-2">
            <div className="flex items-center gap-2 min-w-0">
              <span className="text-lg flex-shrink-0">{stop.emoji}</span>
              <span className="text-[13px] font-semibold leading-tight" style={{color:checked?"#f2ead3":"#f2ead3aa"}}>{stop.name}</span>
              <span className="text-[10px] px-1.5 py-0.5 rounded-full flex-shrink-0" style={{background:`${TAG_COLORS[stop.tag]||"#888"}22`,color:TAG_COLORS[stop.tag]||"#888"}}>{stop.tag}</span>
            </div>
            <button onClick={()=>setOpen(o=>!o)} className="flex-shrink-0 text-[#f2ead3]/25 hover:text-[#e8a13c] transition p-0.5"><IChevron s={13} up={open}/></button>
          </div>
          {open&&<p className="mt-2 text-[11px] text-[#f2ead3]/55 leading-relaxed pr-2">{stop.desc}</p>}
        </div>
      </div>
    </div>
  );
}

/* ── RIGHT PANEL ── */
function Right({result}){
  if(!result) return(
    <div className="border border-dashed border-[#f2ead3]/10 rounded-xl flex flex-col items-center justify-center min-h-[500px] text-center font-sans no-print">
      <div className="opacity-20"><ICompass s={52}/></div>
      <p className="mt-4 text-[#f2ead3]/35 text-[14px] max-w-xs leading-relaxed">Seleziona le tappe,<br/>scegli il numero di basi<br/>e premi <em>"Calcola"</em></p>
    </div>
  );
  if(result.error) return <div className="border border-[#d9694f]/30 rounded-xl flex items-center justify-center min-h-[100px] font-sans text-[#d9694f] text-[13px] px-8">{result.error}</div>;
  return(
    <div className="space-y-5">
      <Stats result={result}/>
      <Accommodations result={result}/>
      <MapLeaflet result={result}/>
      <DayPlan result={result}/>
    </div>
  );
}

function Stats({result}){
  return(
    <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 print-card">
      {[
        {v:result.numBasesUsed,l:"Basi alloggio",s:"cluster k-medoids"},
        {v:`${result.totalKm} km`,l:"Percorso totale",s:"distanza aerea"},
        {v:`${result.totalHours} h`,l:"Ore di guida",s:"media 60 km/h"},
        {v:result.nodes.length-1,l:"Tappe",s:"escluso aeroporto"},
      ].map(x=>(
        <div key={x.l} className="border border-[#f2ead3]/10 rounded-xl p-3 bg-[#0a2230]/60 text-center">
          <div className="text-2xl text-[#e8a13c]" style={{fontFamily:"Georgia,serif"}}>{x.v}</div>
          <div className="text-[10px] uppercase tracking-wide text-[#f2ead3]/40 mt-0.5">{x.l}</div>
          <div className="text-[9px] text-[#f2ead3]/20 mt-0.5">{x.s}</div>
        </div>
      ))}
    </div>
  );
}

/* ── CARD BASI CONSIGLIATE ── */
function Accommodations({result}){
  const{accommodations}=result;
  return(
    <div className="border border-[#f2ead3]/10 rounded-xl p-5 bg-[#0a2230]/60 print-card">
      <div className="flex items-center gap-2 text-[#e8a13c] mb-4">
        <IBed s={15}/><span className="text-[11px] uppercase tracking-[0.2em] font-bold">Basi di alloggio consigliate</span>
        <span className="text-[10px] text-[#f2ead3]/30 ml-1">· calcolate con k-medoids</span>
      </div>
      <div className={`grid gap-3 ${accommodations.length<=2?"grid-cols-1 sm:grid-cols-2":"grid-cols-1 sm:grid-cols-2 lg:grid-cols-3"}`}>
        {accommodations.map((a,i)=>(
          <div key={i} className="rounded-xl p-4 border" style={{background:`${a.color}10`,borderColor:`${a.color}30`}}>
            <div className="flex items-center gap-2 mb-2">
              <span className="w-6 h-6 rounded-full flex items-center justify-center text-[11px] font-bold text-[#0d2b3e] flex-shrink-0" style={{background:a.color}}>{a.baseNum}</span>
              <div>
                <div className="text-[13px] font-bold" style={{color:a.color}}>Base {a.baseNum}: {a.town}</div>
                <div className="text-[10px] text-[#f2ead3]/35">{a.nights} {a.nights===1?"notte":"notti"}</div>
              </div>
            </div>
            {a.note&&<p className="text-[11px] text-[#f2ead3]/55 mb-3 leading-relaxed border-t border-[#f2ead3]/8 pt-2">{a.note}</p>}
            <div className="space-y-0.5">
              <div className="text-[10px] uppercase tracking-wide text-[#f2ead3]/30 mb-1">Tappe coperte</div>
              {a.stops.map((s,j)=>{
                const ps=PRESET_STOPS.find(p=>p.id===s.id);
                const isMedoid=s.id===a.medoidStop.id;
                return(
                  <div key={j} className="flex items-center gap-1.5 text-[12px]">
                    <span className="flex-shrink-0">{ps?.emoji||"📍"}</span>
                    <span style={{color:isMedoid?a.color:"#f2ead3aa"}}>{s.name}</span>
                    {isMedoid&&<span className="text-[9px] px-1 rounded" style={{background:`${a.color}25`,color:a.color}}>base ottimale</span>}
                  </div>
                );
              })}
            </div>
          </div>
        ))}
      </div>
      <p className="text-[10px] text-[#f2ead3]/25 mt-3 font-sans">L'algoritmo k-medoids ha scelto come centro di ogni base la tappa che minimizza la somma delle distanze alle altre tappe del gruppo.</p>
    </div>
  );
}

/* ── MAPPA LEAFLET ── */
function MapLeaflet({result}){
  const mapDiv=useRef(null);
  const mapInst=useRef(null);

  useEffect(()=>{
    if(!mapDiv.current||!result) return;
    if(mapInst.current){mapInst.current.remove();mapInst.current=null;}

    const{nodes,routeIdx,segKm,accommodations,medoidNodeIdx,nodeCluster}=result;

    const visitOrder={};
    routeIdx.forEach((ni,pos)=>{visitOrder[ni]=pos;});

    // indice base di ciascun nodo
    const nodeBase={};
    const clusterToBase={};
    accommodations.forEach((a,bi)=>{clusterToBase[bi]=bi;});
    nodes.forEach((_,ni)=>{
      if(ni===0) return;
      const c=nodeCluster[ni];
      if(c!==undefined) nodeBase[ni]=c;
    });
    // riordina: nodeCluster usa il clusterOrder originale
    // accommodations[bi].stops contiene già i nodi della base bi

    const map=L.map(mapDiv.current,{zoomControl:true}).setView([39.1,8.9],9);
    mapInst.current=map;

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
      attribution:'&copy; OpenStreetMap &copy; CARTO',subdomains:'abcd',maxZoom:19
    }).addTo(map);

    // percorso
    const rCoords=routeIdx.map(i=>[nodes[i].lat,nodes[i].lon]);
    L.polyline(rCoords,{color:'#e8a13c',weight:3,opacity:.85,dashArray:'10,7'}).addTo(map);

    // etichette km
    for(let i=0;i<routeIdx.length-1;i++){
      const a=nodes[routeIdx[i]],b=nodes[routeIdx[i+1]];
      const km=segKm?.[i]??0;
      if(km>0){
        L.marker([(a.lat+b.lat)/2,(a.lon+b.lon)/2],{
          icon:L.divIcon({html:`<div class="km-label">${km} km</div>`,iconSize:null,iconAnchor:[20,10],className:''}),interactive:false
        }).addTo(map);
      }
    }

    // marker nodi
    nodes.forEach((node,ni)=>{
      const isCag=ni===0;
      // trova a quale base appartiene
      let baseIdx=-1;
      if(!isCag){
        for(let bi=0;bi<accommodations.length;bi++){
          if(accommodations[bi].stops.some(s=>s.id===node.id)){baseIdx=bi;break;}
        }
      }
      const color=isCag?'#f2ead3':(baseIdx>=0?accommodations[baseIdx].color:'#888');
      const label=isCag?'✈':String(visitOrder[ni]);
      const size=36;
      const isMedoid=medoidNodeIdx.includes(ni);
      const ps=PRESET_STOPS.find(s=>s.id===node.id);

      const marker=L.marker([node.lat,node.lon],{
        icon:L.divIcon({
          html:`<div class="lmarker" style="width:${size}px;height:${size}px;background:${color};font-size:${isCag?16:13}px;${isMedoid?`box-shadow:0 0 0 4px ${color}55,0 2px 12px rgba(0,0,0,.6)`:''}">${label}</div>`,
          iconSize:[size,size],iconAnchor:[size/2,size/2],className:'',
        }),
        zIndexOffset:isMedoid?500:(isCag?1000:100),
      }).addTo(map);

      const accInfo=isMedoid&&baseIdx>=0?`<div style="margin-top:8px;padding:8px;background:#e8a13c18;border-radius:8px;border:1px solid #e8a13c33"><div style="font-size:11px;color:#e8a13c;font-weight:700;margin-bottom:2px">🏠 Base ottimale · ${accommodations[baseIdx].town}</div><div style="font-size:11px;color:#f2ead3aa">${accommodations[baseIdx].note}</div></div>`:'';
      marker.bindPopup(`
        <div style="min-width:210px;max-width:270px">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
            <span style="font-size:22px">${ps?.emoji||'📍'}</span>
            <div>
              <div style="font-weight:700;font-size:14px;color:#f2ead3">${node.name}</div>
              ${baseIdx>=0?`<span style="font-size:10px;padding:2px 7px;border-radius:999px;background:${accommodations[baseIdx].color}25;color:${accommodations[baseIdx].color}">Base ${baseIdx+1}</span>`:''}
            </div>
          </div>
          ${ps?.desc?`<p style="font-size:12px;color:#f2ead3bb;line-height:1.5;margin:0 0 4px">${ps.desc}</p>`:''}
          ${accInfo}
          ${!isCag?`<div style="margin-top:6px;font-size:10px;color:#f2ead3aa">Ordine visita: #${visitOrder[ni]}</div>`:''}
        </div>
      `,{maxWidth:290});
    });

    // icona casa sui medoid
    medoidNodeIdx.forEach((ni,bi)=>{
      const node=nodes[ni];
      const a=accommodations[bi];
      L.marker([node.lat,node.lon],{
        icon:L.divIcon({
          html:`<div class="lhouse" style="color:${a.color}">🏠</div>`,
          iconSize:[24,24],iconAnchor:[12,-20],className:'',
        }),
        interactive:false,zIndexOffset:600,
      }).addTo(map);
    });

    const bounds=nodes.map(n=>[n.lat,n.lon]);
    map.fitBounds(bounds,{padding:[50,50]});
    return()=>{if(mapInst.current){mapInst.current.remove();mapInst.current=null;}};
  },[result]);

  return(
    <div className="border border-[#f2ead3]/10 rounded-xl overflow-hidden print-card">
      <div className="flex items-center justify-between px-4 py-3 bg-[#0a2230]/80 no-print">
        <div className="flex items-center gap-2 text-[#e8a13c]"><IPin s={14}/><span className="text-[11px] uppercase tracking-[0.2em] font-bold">Mappa del percorso</span></div>
        <div className="flex flex-wrap gap-x-4 gap-y-1">
          {result?.accommodations?.map((a,i)=>(
            <div key={i} className="flex items-center gap-1.5 text-[11px]">
              <span className="w-2.5 h-2.5 rounded-full" style={{background:a.color}}/>
              <span className="text-[#f2ead3]/50">Base {a.baseNum}: {a.town}</span>
            </div>
          ))}
        </div>
      </div>
      <div ref={mapDiv} style={{height:'480px'}}/>
      <div className="px-4 py-2 bg-[#0a2230]/60 text-[10px] text-[#f2ead3]/25 font-sans no-print">
        🏠 = base di alloggio consigliata · Clicca sui marker per dettagli · OpenStreetMap/CARTO
      </div>
    </div>
  );
}

/* ── PIANO GIORNI ── */
function DayPlan({result}){
  const{days,accommodations}=result;
  return(
    <div className="border border-[#f2ead3]/10 rounded-xl p-5 bg-[#0a2230]/60 print-card">
      <div className="flex items-center gap-2 text-[#e8a13c] mb-4"><IRoute s={14}/><span className="text-[11px] uppercase tracking-[0.2em] font-bold">Piano giorno per giorno</span></div>
      <ol className="space-y-0">
        {days.map(d=>(
          <li key={d.day} className="flex gap-3 items-start py-2.5 border-b border-[#f2ead3]/6 last:border-0">
            <div className="flex-shrink-0 w-5 flex justify-center pt-1">
              {(d.type==="arrivo"||d.type==="rientro")&&<span className="text-[#e8a13c] text-sm">✈</span>}
              {d.type==="base"&&<span className="w-2.5 h-2.5 rounded-full mt-0.5" style={{background:accommodations[(d.base-1)%accommodations.length]?.color||"#888"}}/>}
            </div>
            <div>
              <span className="text-[10px] uppercase tracking-wide text-[#f2ead3]/30 mr-2">Giorno {d.day}</span>
              <span className="text-[13px] leading-relaxed">{d.label}</span>
              {d.type==="base"&&accommodations[d.base-1]&&(
                <span className="ml-2 text-[10px] text-[#f2ead3]/30">· dormi a {accommodations[d.base-1].town}</span>
              )}
            </div>
          </li>
        ))}
      </ol>
    </div>
  );
}
</script>
<script>
document.addEventListener('DOMContentLoaded',function(){
  try{
    var src=document.getElementById('src').textContent;
    var code=Babel.transform(src,{presets:[['react',{runtime:'classic'}]],plugins:['transform-modules-commonjs']}).code;
    var module={exports:{}};var exports=module.exports;
    eval(code);
    var App=module.exports.default||module.exports;
    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  }catch(e){
    document.getElementById('root').innerHTML='<div style="color:#d9694f;padding:2rem;font-family:monospace;white-space:pre-wrap;font-size:12px">ERRORE:\n'+e.message+'</div>';
    console.error(e);
  }
});
</script>
</body>
</html>
